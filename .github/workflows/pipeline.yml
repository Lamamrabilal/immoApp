name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/projet_app_immo-web
  PYTHON_VERSION: "3.11"

# ============================================
# JOB 1 — QUALITÉ DU CODE
# ============================================
jobs:
  code_quality:
    name: 🔍 Qualité du code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Installer les outils qualité
        run: pip install flake8 black isort

      - name: Vérifier le formatage (black)
        run: black --check .
        continue-on-error: true

      - name: Vérifier les imports (isort)
        run: isort --check-only .
        continue-on-error: true

      - name: Linting (flake8)
        run: flake8 . --max-line-length=120 --exclude=migrations,.venv
        continue-on-error: true

# ============================================
# JOB 2 — TESTS
# ============================================
  tests:
    name: 🧪 Tests
    runs-on: ubuntu-latest
    needs: code_quality

    services:
      db:
        image: postgres:15
        env:
          POSTGRES_DB: immo_db_test
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      SECRET_KEY: django-insecure-test-key-for-ci-only
      DJANGO_DATABASE_URL: postgres://user:password@localhost:5432/immo_db_test
      ALLOWED_HOSTS: localhost,127.0.0.1
      DEBUG: "True"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Installer les dépendances
        run: pip install -r requirements.txt

      - name: Appliquer les migrations
        run: python manage.py migrate --settings=projet_app_immo.settings_test

      - name: Lancer les tests
        run: |
          python manage.py test \
            --settings=projet_app_immo.settings_test \
            --verbosity=2

# ============================================
# JOB 3 — BUILD DOCKER
# ============================================
  build:
    name: 🐳 Build Docker
    runs-on: ubuntu-latest
    needs: tests

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build et Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

# ============================================
# JOB 4 — DÉPLOIEMENT (uniquement sur main)
# ============================================
  deploy:
    name: 🚀 Déploiement
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Configurer la clé SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy to Server
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} << 'EOF'
            docker pull ${{ env.IMAGE_NAME }}:${{ github.sha }}
            docker stop projet_app_immo-web || true
            docker rm projet_app_immo-web || true
            docker run -d \
              --name projet_app_immo-web \
              --restart unless-stopped \
              -p 8000:8000 \
              -e DJANGO_SETTINGS_MODULE=projet_app_immo.settings \
              -e SECRET_KEY=${{ secrets.DJANGO_SECRET_KEY }} \
              -e DJANGO_DATABASE_URL=${{ secrets.DJANGO_DATABASE_URL }} \
              -e ALLOWED_HOSTS=${{ secrets.ALLOWED_HOSTS }} \
              ${{ env.IMAGE_NAME }}:${{ github.sha }}
          EOF

      - name: Vérification santé
        run: |
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} \
            "docker exec projet_app_immo-web python manage.py check --deploy"

# ============================================
# JOB 5 — NOTIFICATION
# ============================================
  notify:
    name: 📢 Notification
    runs-on: ubuntu-latest
    needs: [code_quality, tests, build, deploy]
    if: always()

    steps:
      - name: Résultat du pipeline
        run: |
          if [ "${{ needs.deploy.result }}" == "success" ]; then
            echo "✅ Pipeline réussi - Application déployée"
          else
            echo "❌ Pipeline échoué - vérifiez les logs"
            exit 1
          fi
