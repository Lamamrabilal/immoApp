name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t mon-dockerhub/projet_app_immo-web:latest .

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Push Docker image
        run: docker push mon-dockerhub/projet_app_immo-web:latest

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Server
        run: |
          ssh -o StrictHostKeyChecking=no user@server_ip << 'EOF'
          docker pull mon-dockerhub/projet_app_immo-web:latest
          docker stop projet_app_immo-web || true
          docker rm projet_app_immo-web || true
          docker run -d --name projet_app_immo-web -p 8000:8000 mon-dockerhub/projet_app_immo-web:latest
          EOF
