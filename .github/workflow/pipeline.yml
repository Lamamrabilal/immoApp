name: CI/CD Pipeline

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/projet_app_immo-web

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build et push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Configurer la clé SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy to Server
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} << 'EOF'
            docker pull ${{ env.IMAGE_NAME }}:${{ github.sha }}
            docker stop projet_app_immo-web || true
            docker rm projet_app_immo-web || true
            docker run -d \
              --name projet_app_immo-web \
              --restart unless-stopped \
              -p 8000:8000 \
              -e DJANGO_SETTINGS_MODULE=projet_app_immo.settings \
              -e SECRET_KEY=${{ secrets.DJANGO_SECRET_KEY }} \
              -e DATABASE_URL=${{ secrets.DATABASE_URL }} \
              ${{ env.IMAGE_NAME }}:${{ github.sha }}
          EOF

      - name: Vérification santé
        run: |
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} \
            "docker exec projet_app_immo-web python manage.py check --deploy"